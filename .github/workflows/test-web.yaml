name: Run tests (web)

on:
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "web/bun.lock"
  push:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "web/bun.lock"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Build web project
        run: |
          bun install
          bun run build
        working-directory: ./web
      - name: Run tests
        run: bun test
        working-directory: ./web
      - name: Run typecheck
        run: bun typecheck
        working-directory: ./web
